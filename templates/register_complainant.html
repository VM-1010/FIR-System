<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register Complainant</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <main class="officer-page">
    <div class="officer-container">
      <article class="panel-card">
        <header class="panel-header">
          <h2>Register New Complainant</h2>
          <p class="subtitle-tight">Enter complainant details</p>
        </header>
        <hr>

        <form class="form" method="POST" action="{{ url_for('register_complainant') }}">
          <section class="form-box system-box">
            <div class="field-group">
              <label for="complainantIdPreview">Complainant ID</label>
              <input id="complainantIdPreview" type="text" value="Auto generated by system" readonly>
            </div>
          </section>

          <section class="form-box">
            <h3>Personal Information</h3>
            <div class="form-grid two-col">
              <div class="field-group">
                <label for="name">Name <span class="required">*</span></label>
                <input id="name" name="name" type="text" placeholder="Enter full name" required>
              </div>
              <div class="field-group">
                <label for="age">Age <span class="required">*</span></label>
                <input id="age" name="age" type="number" min="1" placeholder="Enter age" required>
              </div>
              <div class="field-group">
                <label for="gender">Gender <span class="required">*</span></label>
                <select id="gender" name="gender" required>
                  <option value="">Select Gender</option>
                  <option value="Male">Male</option>
                  <option value="Female">Female</option>
                  <option value="Other">Other</option>
                </select>
              </div>
              <div class="field-group">
                <label for="contact_no">Contact Number <span class="required">*</span></label>
                <input id="contact_no" name="contact_no" type="tel" pattern="[0-9]{10}" maxlength="10" placeholder="Enter 10-digit mobile number" required>
              </div>
            </div>
          </section>

          <section class="form-box">
            <h3>Contact and Identity</h3>
            <div class="form-grid two-col">
              <div class="field-group">
                <label for="id_proof">ID Proof <span class="required">*</span></label>
                <select id="id_proof" name="id_proof" required>
                  <option value="">Select ID Proof Type</option>
                  <option value="Aadhaar">Aadhaar</option>
                  <option value="PAN Card">PAN Card</option>
                  <option value="Driving License">Driving License</option>
                  <option value="Voter ID">Voter ID</option>
                </select>
              </div>
              <div class="field-group full-width">
                <label for="address">Address <span class="required">*</span></label>
                <textarea id="address" name="address" rows="4" placeholder="Enter full residential address" required></textarea>
              </div>
            </div>
          </section>

          <div class="form-actions">
            <button type="submit" class="btn btn-primary">Submit</button>
            <button type="reset" class="btn btn-secondary">Reset</button>
            <a class="btn btn-ghost" href="{{ url_for('home') }}">Cancel</a>
          </div>
        </form>
      </article>
    </div>
  </main>
</body>
</html>
