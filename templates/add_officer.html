<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Officer</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <main class="admin-page">
    <div class="admin-container">
      <article class="admin-card">
        <header class="panel-header">
          <h2>Add New Officer</h2>
          <p class="subtitle-tight">Station ID: {{ session.get('stationId', 'N/A') }} | Logged in Admin: {{ session.get('officerId', 'N/A') }}</p>
        </header>
        <hr>

        <form class="form" method="POST" action="{{ url_for('add_officer') }}">
          <section class="form-box system-box">
            <h3>System Generated Information</h3>
            <div class="form-grid two-col">
              <div class="field-group">
                <label for="officerIdPreview">Officer ID</label>
                <input id="officerIdPreview" type="text" value="Auto generated by system" readonly>
              </div>
              <div class="field-group">
                <label for="stationIdPreview">Station ID</label>
                <input id="stationIdPreview" type="text" value="{{ session.get('stationId', '') }}" readonly>
              </div>
            </div>
          </section>

          <section class="form-box">
            <h3>Officer Details</h3>
            <div class="form-grid two-col">
              <div class="field-group">
                <label for="name">Officer Name <span class="required">*</span></label>
                <input id="name" name="name" type="text" minlength="3" placeholder="Enter officer full name" required>
              </div>
              <div class="field-group">
                <label for="rank">Rank <span class="required">*</span></label>
                <select id="rank" name="rank" required>
                  <option value="">Select Rank</option>
                  <option value="Constable">Constable</option>
                  <option value="Head Constable">Head Constable</option>
                  <option value="Sub Inspector">Sub Inspector</option>
                  <option value="Inspector">Inspector</option>
                  <option value="Deputy Superintendent">Deputy Superintendent</option>
                </select>
              </div>
              <div class="field-group">
                <label for="badge_no">Badge Number <span class="required">*</span></label>
                <input id="badge_no" name="badge_no" type="text" placeholder="Enter official badge number" required>
              </div>
              <div class="field-group">
                <label for="contact_no">Contact Number <span class="required">*</span></label>
                <input id="contact_no" name="contact_no" type="tel" pattern="[0-9]{10}" maxlength="10" placeholder="Enter 10-digit contact number" required>
              </div>
              <div class="field-group">
                <label for="role">Role <span class="required">*</span></label>
                <select id="role" name="role" required>
                  <option value="officer">Officer</option>
                  <option value="admin">Admin</option>
                </select>
              </div>
            </div>
          </section>

          <section class="form-box admin-info-box system-box">
            <h3>Station Mapping Information</h3>
            <p>This officer will be assigned to station ID <strong>{{ session.get('stationId', 'N/A') }}</strong>.</p>
          </section>

          <div class="form-actions">
            <button type="submit" class="btn btn-primary">Add Officer</button>
            <button type="reset" class="btn btn-secondary">Reset</button>
            <a class="btn btn-ghost" href="{{ url_for('home') }}">Cancel</a>
          </div>
        </form>
      </article>
    </div>
  </main>
</body>
</html>
