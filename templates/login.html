<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FIR System | Login</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <main class="page page-login">
    <section class="card auth-card">
      <h1>FIR System Login</h1>
      <p class="subtitle">Enter credentials to continue</p>

      {% with messages = get_flashed_messages() %}
        {% if messages %}
          <p class="message" aria-live="polite">{{ messages[0] }}</p>
        {% endif %}
      {% endwith %}

      <form class="form" method="POST" action="{{ url_for('login') }}">
        <label for="officer_id">Officer ID</label>
        <input id="officer_id" name="officer_id" type="text" placeholder="Enter officer ID" required>

        <label for="station_id">Station ID</label>
        <input id="station_id" name="station_id" type="text" placeholder="Enter station ID" required>

        <label for="password">Password</label>
        <input id="password" name="password" type="password" placeholder="Enter password" required>

        <button type="submit" class="btn btn-primary">Login</button>
      </form>
    </section>
  </main>
</body>
</html>
