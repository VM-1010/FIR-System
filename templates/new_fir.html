<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register New FIR</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <main class="officer-page">
    <div class="officer-container">
      <article class="panel-card">
        <header class="panel-header">
          <h2>Register New FIR</h2>
          <p class="subtitle-tight">Station ID: {{ session.get('stationId', 'N/A') }} | Logged in Officer: {{ session.get('officerId', 'N/A') }}</p>
        </header>
        <hr>

        <form class="form" method="POST" action="{{ url_for('new_fir') }}">
          <section class="form-box system-box">
            <h3>System Generated Information</h3>
            <div class="form-grid two-col">
              <div class="field-group">
                <label for="fir_no">FIR Number</label>
                <input id="fir_no" name="fir_no" type="text" value="{{ preview.fir_no if preview else '' }}" readonly>
              </div>
              <div class="field-group">
                <label for="date_filed">Date Filed</label>
                <input id="date_filed" name="date_filed" type="text" value="{{ preview.date_filed if preview else '' }}" readonly>
              </div>
              <div class="field-group">
                <label for="time_filed">Time Filed</label>
                <input id="time_filed" name="time_filed" type="text" value="{{ preview.time_filed if preview else '' }}" readonly>
              </div>
              <div class="field-group">
                <label for="officer_id">Officer ID</label>
                <input id="officer_id" name="officer_id" type="text" value="{{ session.get('officerId', '') }}" readonly>
              </div>
              <div class="field-group">
                <label for="station_id">Station ID</label>
                <input id="station_id" name="station_id" type="text" value="{{ session.get('stationId', '') }}" readonly>
              </div>
              <div class="field-group">
                <label for="status">Status</label>
                <input id="status" name="status" type="text" value="{{ preview.status if preview else 'Registered' }}" readonly>
              </div>
            </div>
          </section>

          <section class="form-box">
            <h3>FIR Case Details</h3>
            <div class="form-grid two-col">
              <div class="field-group">
                <label for="place_of_occurrence">Place of Occurrence <span class="required">*</span></label>
                <input id="place_of_occurrence" name="place_of_occurrence" type="text" placeholder="Enter location where incident occurred" required>
              </div>
              <div class="field-group">
                <label for="complainant_id">Complainant ID <span class="required">*</span></label>
                <select id="complainant_id" name="complainant_id" required>
                  <option value="">Select Complainant ID</option>
                  {% for complainant_id in complainant_ids or [] %}
                    <option value="{{ complainant_id }}">{{ complainant_id }}</option>
                  {% endfor %}
                </select>
              </div>
              <div class="field-group full-width">
                <label for="description">Description <span class="required">*</span></label>
                <textarea id="description" name="description" rows="6" placeholder="Enter detailed description of the incident" required></textarea>
              </div>
            </div>
          </section>

          <div class="form-actions">
            <button type="submit" class="btn btn-primary">Submit FIR</button>
            <button type="reset" class="btn btn-secondary">Reset</button>
            <a class="btn btn-ghost" href="{{ url_for('home') }}">Cancel</a>
          </div>
        </form>
      </article>
    </div>
  </main>
</body>
</html>
