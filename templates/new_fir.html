<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New FIR</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <main class="officer-page">
    <div class="officer-container">
      <article class="panel-card">
        <header class="panel-header">
          <h2>Register New FIR</h2>
        </header>
        <hr>
        <form class="form" method="POST" action="{{ url_for('new_fir') }}">
          <div class="form-grid two-col">
            <div class="field-group">
              <label for="complainantName">Complainant Name</label>
              <input id="complainantName" name="complainantName" type="text" required>
            </div>
            <div class="field-group">
              <label for="location">Location</label>
              <input id="location" name="location" type="text" required>
            </div>
            <div class="field-group full-width">
              <label for="description">Description</label>
              <textarea id="description" name="description" rows="6" required></textarea>
            </div>
          </div>
          <div class="form-actions">
            <button type="submit" class="btn btn-primary">Submit FIR</button>
            <a class="btn btn-secondary" href="{{ url_for('home') }}">Cancel</a>
          </div>
        </form>
      </article>
    </div>
  </main>
</body>
</html>
