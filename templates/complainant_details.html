<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Complainant Details</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <main class="officer-page">
    <div class="officer-container">
      <article class="panel-card">
        <header class="panel-header">
          <h2>Complainant Details</h2>
        </header>
        <hr>

        {% if complainant %}
          <section class="form-box system-box">
            <div class="form-grid three-col">
              <div class="field-group">
                <label>Complainant ID</label>
                <input type="text" value="{{ complainant.get('complainant_id', 'N/A') }}" readonly>
              </div>
              <div class="field-group">
                <label>Name</label>
                <input type="text" value="{{ complainant.get('name', 'N/A') }}" readonly>
              </div>
              <div class="field-group">
                <label>Contact Number</label>
                <input type="text" value="{{ complainant.get('contact_no', 'N/A') }}" readonly>
              </div>
              <div class="field-group">
                <label>Age</label>
                <input type="text" value="{{ complainant.get('age', 'N/A') }}" readonly>
              </div>
              <div class="field-group">
                <label>Gender</label>
                <input type="text" value="{{ complainant.get('gender', 'N/A') }}" readonly>
              </div>
              <div class="field-group">
                <label>ID Proof</label>
                <input type="text" value="{{ complainant.get('id_proof', 'N/A') }}" readonly>
              </div>
              <div class="field-group full-width">
                <label>Address</label>
                <textarea rows="4" readonly>{{ complainant.get('address', '') }}</textarea>
              </div>
            </div>
          </section>
        {% else %}
          <p class="alert error">Complainant data not found.</p>
        {% endif %}

        <div class="form-actions">
          <a class="btn btn-secondary" href="{{ url_for('home') }}">Back</a>
        </div>
      </article>
    </div>
  </main>
</body>
</html>
